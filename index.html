<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }
        h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
        .subtitle { color: #667eea; font-size: 16px; margin-bottom: 25px; font-weight: 500; }
        .bio { color: #666; line-height: 1.8; margin-bottom: 30px; font-size: 15px; }
        .contact { display: flex; flex-direction: column; gap: 12px; }
        .contact a {
            display: block; padding: 12px 20px; border-radius: 10px;
            text-decoration: none; color: #333; background: #f5f5f5;
            transition: all 0.3s; font-size: 14px;
        }
        .contact a:hover { background: #667eea; color: white; transform: translateY(-2px); }
        .footer { margin-top: 30px; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">👤</div>
        <h1>你的名字</h1>
        <div class="subtitle">一句话介绍自己</div>
        <div class="bio">在这里写上你的个人介绍，比如你的职业、兴趣爱好、擅长领域等。让访客快速了解你。</div>
        <div class="contact">
            <a href="mailto:your@email.com">📧 your@email.com</a>
            <a href="#">💬 微信号：your_wechat</a>
            <a href="#">🌐 个人博客/主页</a>
        </div>
        <div class="footer">© 2026 个人介绍</div>
    </div>
</body>
</html>
